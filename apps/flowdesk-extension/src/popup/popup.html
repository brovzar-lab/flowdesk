<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowDesk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      min-height: 120px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-active { background: #14b8a6; box-shadow: 0 0 6px #14b8a6; }
    .dot-idle { background: #475569; }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .task-title {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .timer {
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #14b8a6;
      margin-bottom: 14px;
      letter-spacing: -0.02em;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 6px;
    }

    .domain-list {
      list-style: none;
      margin-bottom: 12px;
    }

    .domain-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      background: #1e293b;
      border-radius: 6px;
      margin-bottom: 4px;
    }

    .domain-item.overridden {
      opacity: 0.5;
    }

    .domain-name {
      color: #cbd5e1;
      font-size: 12px;
    }

    .override-badge {
      font-size: 10px;
      color: #f59e0b;
      background: rgba(245, 158, 11, 0.12);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(245, 158, 11, 0.25);
    }

    .overrides-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-top: 1px solid #1e293b;
    }

    .overrides-label {
      color: #64748b;
      font-size: 11px;
    }

    .overrides-count {
      font-weight: 700;
      color: #94a3b8;
      font-size: 13px;
    }

    .idle-msg {
      color: #64748b;
      font-size: 12px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .open-link {
      display: block;
      text-align: center;
      padding: 8px;
      background: #14b8a6;
      color: #0f172a;
      font-weight: 700;
      font-size: 12px;
      border-radius: 8px;
      text-decoration: none;
    }

    .open-link:hover {
      background: #0d9488;
    }

    .focus-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .focus-label {
      font-size: 12px;
      color: #94a3b8;
    }

    .toggle-btn {
      padding: 4px 10px;
      border-radius: 12px;
      border: none;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    .toggle-on {
      background: rgba(20, 184, 166, 0.2);
      color: #14b8a6;
      border: 1px solid rgba(20, 184, 166, 0.4);
    }

    .toggle-off {
      background: #1e293b;
      color: #64748b;
      border: 1px solid #334155;
    }

    .toggle-off:hover {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./popup.js"></script>
</body>
</html>
